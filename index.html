<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Chạy YOLOv8 ONNX Local (Dọc)</title>
    <!-- Tải thư viện ONNX Runtime Web từ CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        /* Thiết lập box-sizing chung giúp kiểm soát padding và border không làm tràn khung */
        * { 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f3f4f6; 
            margin: 0; 
            padding: 20px; 
            color: #1f2937; 
            overflow-x: hidden; /* Ngăn chặn cuộn ngang body */
        }
        
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }
        
        h2 { 
            text-align: center; 
            color: #1e3a8a; 
            margin-bottom: 5px; 
        }
        
        .subtitle { 
            text-align: center; 
            color: #6b7280; 
            margin-bottom: 25px; 
            font-size: 14px; 
        }
        
        /* Bố cục dọc cho các ô ảnh */
        .image-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 25px; 
        }
        
        .image-box { 
            width: 100%; 
            max-width: 600px; 
            min-width: 0; 
            text-align: center; 
            border: 2px dashed #d1d5db; 
            padding: 15px; 
            border-radius: 8px; 
            background: #fafafa; 
            position: relative; 
        }
        
        .image-box label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #374151; 
        }

        .image-box input[type="file"] {
            max-width: 100%; 
            margin-bottom: 10px;
        }
        
        canvas { 
            max-width: 100%; 
            height: auto !important; 
            border-radius: 6px; 
            display: none; 
            margin: 10px auto 0 auto; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }
        
        button { 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            font-size: 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: all 0.2s; 
            box-shadow: 0 4px 6px -1px rgba(37,99,235,0.2); 
            max-width: 600px; 
            display: block;
            margin: 0 auto;
        }
        
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        .status-bar { 
            text-align: center; 
            margin-top: 15px; 
            font-weight: 500; 
            padding: 10px; 
            border-radius: 6px; 
            background-color: #e5e7eb; 
            color: #374151; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .status-ready { background-color: #dcfce7; color: #166534; }
        .status-error { background-color: #fee2e2; color: #991b1b; }

        @media (max-width: 768px) {
            body { 
                padding: 10px; 
            }
            
            .container { 
                padding: 15px; 
                border-radius: 8px; 
            }
            
            h2 { 
                font-size: 1.3rem; 
            }
            
            .subtitle { 
                font-size: 12px; 
                margin-bottom: 15px; 
            }
            
            .image-container { 
                gap: 15px; 
            }
            
            button { 
                padding: 12px 15px; 
                font-size: 14px; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trạm Kiểm Soát Dụng Cụ - AI Cục Bộ</h2>
    <div class="subtitle">Phát hiện đối tượng bằng mô hình YOLOv8 (.onnx) chạy trực tiếp trên trình duyệt</div>

    <div id="modelStatus" class="status-bar">Đang tải mô hình ONNX... Vui lòng đợi!</div>

    <div class="image-container">
        <!-- Phần 1: Ảnh lúc VÀO -->
        <div class="image-box">
            <label>1. Ảnh chụp lúc VÀO (Check-in)</label>
            <input type="file" id="imageIn" accept="image/*" onchange="previewImage(event, 'canvasIn', 'in')">
            <canvas id="canvasIn"></canvas>
        </div>
        <!-- Phần 2: Ảnh lúc RA -->
        <div class="image-box">
            <label>2. Ảnh chụp lúc RA (Check-out)</label>
            <input type="file" id="imageOut" accept="image/*" onchange="previewImage(event, 'canvasOut', 'out')">
            <canvas id="canvasOut"></canvas>
        </div>
    </div>

    <button id="checkButton" onclick="analyzeImages()" disabled>KÍCH HOẠT QUÉT ĐỐI TƯỢNG</button>
</div>

<script>
    // ==========================================
    // CẤU HÌNH YOLOV8
    // ==========================================
    const MODEL_PATH = "./best.onnx"; 
    const CONFIDENCE_THRESHOLD = 0.5; 
    const IOU_THRESHOLD = 0.45;       
    const MODEL_INPUT_SIZE = 640;     

    let session = null;
    let imgInObj = null;
    let imgOutObj = null;

    // 1. KHỞI TẠO MÔ HÌNH ONNX
    async function initModel() {
        try {
            ort.env.wasm.numThreads = 1; 
            session = await ort.InferenceSession.create(MODEL_PATH, { executionProviders: ['webgl', 'wasm'] });
            
            const statusDiv = document.getElementById('modelStatus');
            statusDiv.textContent = "✅ Ứng dụng đã sẵn sàng!";
            statusDiv.classList.add('status-ready');
            document.getElementById('checkButton').disabled = false;
        } catch (error) {
            console.error(error);
            const statusDiv = document.getElementById('modelStatus');
            statusDiv.textContent = "❌ Lỗi tải mô hình! Hãy kiểm tra lại";
            statusDiv.classList.add('status-error');
        }
    }

    window.onload = initModel;

    // 2. HIỂN THỊ ẢNH GỐC
    function previewImage(event, canvasId, imgKey) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    if (imgKey === 'in') imgInObj = img;
                    if (imgKey === 'out') imgOutObj = img;
                    drawImageOnCanvas(canvasId, img);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    function drawImageOnCanvas(canvasId, imgObj) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const maxDim = 600;
        let width = imgObj.width;
        let height = imgObj.height;

        if (width > maxDim || height > maxDim) {
            if (width > height) { height = (maxDim / width) * height; width = maxDim; } 
            else { width = (maxDim / height) * width; height = maxDim; }
        }
        canvas.width = width;
        canvas.height = height;
        canvas.style.display = 'block';
        ctx.drawImage(imgObj, 0, 0, width, height);
    }

    // 3. TIỀN XỬ LÝ ẢNH (Pre-processing) CHO YOLOV8
    function preprocessImage(imgObj) {
        const canvas = document.createElement('canvas');
        canvas.width = MODEL_INPUT_SIZE;
        canvas.height = MODEL_INPUT_SIZE;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgObj, 0, 0, MODEL_INPUT_SIZE, MODEL_INPUT_SIZE);
        const imgData = ctx.getImageData(0, 0, MODEL_INPUT_SIZE, MODEL_INPUT_SIZE).data;

        const float32Data = new Float32Array(3 * MODEL_INPUT_SIZE * MODEL_INPUT_SIZE);
        for (let i = 0; i < MODEL_INPUT_SIZE * MODEL_INPUT_SIZE; i++) {
            float32Data[i] = imgData[i * 4] / 255.0;                                        
            float32Data[i + MODEL_INPUT_SIZE * MODEL_INPUT_SIZE] = imgData[i * 4 + 1] / 255.0;      
            float32Data[i + 2 * MODEL_INPUT_SIZE * MODEL_INPUT_SIZE] = imgData[i * 4 + 2] / 255.0;  
        }
        return new ort.Tensor('float32', float32Data, [1, 3, MODEL_INPUT_SIZE, MODEL_INPUT_SIZE]);
    }

    // 4. CHẠY SUY LUẬN VÀ HẬU XỬ LÝ (Post-processing)
    async function detectObjects(imgObj, canvasId) {
        if (!session) return;

        const tensor = preprocessImage(imgObj);
        
        const feeds = {};
        feeds[session.inputNames[0]] = tensor;
        const results = await session.run(feeds);
        
        const outputTensor = results[session.outputNames[0]];
        const outputData = outputTensor.data;
        
        const numClasses = outputTensor.dims[1] - 4; 
        const numAnchors = outputTensor.dims[2];     

        let boxes = [];

        for (let i = 0; i < numAnchors; i++) {
            let maxClassScore = 0;
            let classId = -1;

            for (let c = 0; c < numClasses; c++) {
                let score = outputData[(4 + c) * numAnchors + i];
                if (score > maxClassScore) {
                    maxClassScore = score;
                    classId = c;
                }
            }

            if (maxClassScore >= CONFIDENCE_THRESHOLD) {
                let xc = outputData[0 * numAnchors + i]; 
                let yc = outputData[1 * numAnchors + i]; 
                let w = outputData[2 * numAnchors + i];  
                let h = outputData[3 * numAnchors + i];  

                let x1 = xc - w / 2;
                let y1 = yc - h / 2;
                let x2 = xc + w / 2;
                let y2 = yc + h / 2;

                boxes.push({ x1, y1, x2, y2, score: maxClassScore, classId: classId });
            }
        }

        boxes = applyNMS(boxes, IOU_THRESHOLD);
        drawBoxes(canvasId, imgObj, boxes);
    }

    // 5. THUẬT TOÁN NMS (Lọc khung trùng lặp)
    function applyNMS(boxes, iouThreshold) {
        if (boxes.length === 0) return [];
        boxes.sort((a, b) => b.score - a.score);
        
        const selected = [];
        while (boxes.length > 0) {
            const current = boxes.shift();
            selected.push(current);
            boxes = boxes.filter(box => {
                if (box.classId !== current.classId) return true;
                const iou = calculateIoU(current, box);
                return iou < iouThreshold;
            });
        }
        return selected;
    }

    function calculateIoU(box1, box2) {
        const x_left = Math.max(box1.x1, box2.x1);
        const y_top = Math.max(box1.y1, box2.y1);
        const x_right = Math.min(box1.x2, box2.x2); // ĐÃ SỬA: Min.min -> Math.min
        const y_bottom = Math.min(box1.y2, box2.y2); // ĐÃ SỬA: Min.min -> Math.min

        if (x_right < x_left || y_bottom < y_top) return 0.0;

        const intersection = (x_right - x_left) * (y_bottom - y_top);
        const area1 = (box1.x2 - box1.x1) * (box1.y2 - box1.y1);
        const area2 = (box2.x2 - box2.x1) * (box2.y2 - box2.y1);
        
        return intersection / (area1 + area2 - intersection);
    }

    // ==========================================
    // HÀM ÁNH XẠ MÃ ĐỐI TƯỢNG (CLASS ID) -> TÊN NHÃN
    // ==========================================
    function getClassName(classId) {
        if (classId >= 0 && classId <= 30) {
            // Lớp 0 -> AL4_01, Lớp 30 -> AL4_31
            const num = String(classId + 1).padStart(2, '0');
            return `AL4_${num}`;
        } else if (classId >= 31 && classId <= 54) {
            // Lớp 31 -> AL4_mold_01, Lớp 54 -> AL4_mold_24
            const num = String(classId - 30).padStart(2, '0');
            return `AL4_mold_${num}`;
        } else if (classId === 55) {
            return 'AL4';
        }
        return `Unknown (${classId})`;
    }

    // 6. VẼ KHUNG ĐỊNH VỊ & NHÃN CHỮ
    function drawBoxes(canvasId, imgObj, boxes) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');

        const scaleX = canvas.width / MODEL_INPUT_SIZE;
        const scaleY = canvas.height / MODEL_INPUT_SIZE;

        boxes.forEach(box => {
            const x = box.x1 * scaleX;
            const y = box.y1 * scaleY;
            const w = (box.x2 - box.x1) * scaleX;
            const h = (box.y2 - box.y1) * scaleY;

            // 1. Vẽ viền đỏ cho khung đối tượng
            ctx.strokeStyle = '#dc2626'; 
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);

            // 2. Thiết lập cấu hình chữ viết nhãn
            const className = getClassName(box.classId);
            const labelText = `${className} (${(box.score * 100).toFixed(0)}%)`;
            
            ctx.font = 'bold 13px "Segoe UI", Arial, sans-serif';
            ctx.textBaseline = 'top';

            // Tính toán kích thước nền nhãn sao cho vừa khít với chữ
            const textWidth = ctx.measureText(labelText).width + 10; // Thêm 10px khoảng đệm (padding)
            const labelHeight = 22;

            // Xử lý chống tràn nhãn: Nếu khung nằm sát mép trên cùng của ảnh, nhãn sẽ được vẽ bên dưới đường viền trên
            const labelY = (y - labelHeight < 0) ? y : y - labelHeight;

            // Vẽ hộp nền đỏ cho chữ nhãn
            ctx.fillStyle = '#dc2626';
            ctx.fillRect(x, labelY, textWidth, labelHeight);

            // Ghi chữ màu trắng lên trên nền đỏ
            ctx.fillStyle = 'white';
            ctx.fillText(labelText, x + 5, labelY + 4);
        });
    }

    // ==========================================
    // LUỒNG CHẠY CHÍNH KHI NHẤN NÚT
    // ==========================================
    async function analyzeImages() {
        if (!imgInObj || !imgOutObj) {
            alert("Vui lòng tải lên đủ cả hai hình ảnh VÀO và RA!");
            return;
        }

        const btn = document.getElementById('checkButton');
        btn.disabled = true;
        btn.innerText = "ĐANG PHÂN TÍCH...";

        drawImageOnCanvas('canvasIn', imgInObj);
        drawImageOnCanvas('canvasOut', imgOutObj);

        try {
            await detectObjects(imgInObj, 'canvasIn');
            await detectObjects(imgOutObj, 'canvasOut');
        } catch (err) {
            console.error("Lỗi khi quét ảnh:", err);
            alert("Có lỗi xảy ra trong lúc quét. Vui lòng xem Console (F12).");
        } finally {
            btn.disabled = false;
            btn.innerText = "KÍCH HOẠT QUÉT ĐỐI TƯỢNG";
        }
    }
</script>

</body>
</html>
