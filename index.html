<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Kiểm Soát Thiếu Hụt Dụng Cụ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e3a8a; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 25px; font-size: 14px; }
        .image-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .image-box { flex: 1; text-align: center; border: 2px dashed #d1d5db; padding: 15px; border-radius: 8px; background: #fafafa; }
        .image-box label { display: block; font-weight: bold; margin-bottom: 10px; color: #374151; }
        canvas { max-width: 100%; border-radius: 6px; display: none; margin: 10px auto 0 auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        button { background-color: #2563eb; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(37,99,235,0.2); }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        .loader { display: none; text-align: center; margin-top: 15px; font-style: italic; color: #4b5563; font-weight: 500; }
        
        /* Trực quan hóa kết quả nhận diện */
        #result-card { display: none; margin-top: 30px; padding: 20px; border-radius: 8px; border-left: 8px solid; }
        .status-ok { background-color: #f0fdf4; border-color: #16a34a; color: #14532d; }
        .status-missing { background-color: #fef2f2; border-color: #dc2626; color: #991b1b; } /* Thêm style cảnh báo thiếu đồ */
        
        .status-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; }
        .status-desc { font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>Trạm Nhận Diện Dụng Cụ Bằng AI Vision</h2>
    <div class="subtitle">So sánh tự động ảnh Check-in và Check-out để phát hiện mất mát</div>

    <div class="image-container">
        <div class="image-box">
            <label>1. Ảnh chụp lúc VÀO (Check-in)</label>
            <input type="file" id="imageIn" accept="image/*" onchange="previewImage(event, 'canvasIn', 'in')">
            <canvas id="canvasIn"></canvas>
        </div>
        <div class="image-box">
            <label>2. Ảnh chụp lúc RA (Check-out)</label>
            <input type="file" id="imageOut" accept="image/*" onchange="previewImage(event, 'canvasOut', 'out')">
            <canvas id="canvasOut"></canvas>
        </div>
    </div>

    <button id="checkButton" onclick="analyzeImages()">KIỂM TRA & SO SÁNH DỤNG CỤ</button>
    <div class="loader" id="loader">AI đang phân tích cả 2 ảnh và đối chiếu số lượng...</div>

    <div id="result-card">
        <div class="status-title" id="res-title">Trạng thái</div>
        <div class="status-desc" id="res-desc">Mô tả chi tiết</div>
    </div>
</div>

<script>
    // ==========================================
    // CẤU HÌNH API KEY TẠI ĐÂY
    // ==========================================
    const GEMINI_API_KEY = "AIzaSyBzFCl4jIorFMHSLuNFjTaDVG2KloUgePY"; // Khuyến cáo: cẩn thận khi chia sẻ Key này công khai.

    let imgInObj = null;
    let imgOutObj = null;

    function previewImage(event, canvasId, imgKey) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    if (imgKey === 'in') imgInObj = img;
                    if (imgKey === 'out') imgOutObj = img;
                    drawImageOnCanvas(canvasId, img);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    function drawImageOnCanvas(canvasId, imgObj) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const maxDim = 500;
        let width = imgObj.width;
        let height = imgObj.height;

        if (width > maxDim || height > maxDim) {
            if (width > height) { height = (maxDim / width) * height; width = maxDim; } 
            else { width = (maxDim / height) * width; height = maxDim; }
        }
        canvas.width = width;
        canvas.height = height;
        canvas.style.display = 'block';
        ctx.drawImage(imgObj, 0, 0, width, height);
    }

    function drawAlertBox(canvasId, imgObj, box, isMissing = false) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const [ymin, xmin, ymax, xmax] = box;
        const x = (xmin / 1000) * canvas.width;
        const y = (ymin / 1000) * canvas.height;
        const w = ((xmax - xmin) / 1000) * canvas.width;
        const h = ((ymax - ymin) / 1000) * canvas.height;

        // Nếu là công cụ bình thường vẽ màu xanh, nếu cần chú ý có thể đổi màu khác
        ctx.strokeStyle = '#2563eb'; 
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, w, h);
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
                if ((encoded.length % 4) > 0) { encoded += '='.repeat(4 - (encoded.length % 4)); }
                resolve(encoded);
            };
            reader.onerror = error => reject(error);
        });
    }

    // ==========================================
    // GỬI 2 ẢNH CÙNG LÚC ĐỂ GEMINI SO SÁNH
    // ==========================================
    async function compareToolsWithAI(base64In, mimeIn, base64Out, mimeOut) {
        const promptText = `Nhiệm vụ của bạn là so sánh 2 bức ảnh để kiểm tra xem lúc RA có bị thiếu dụng cụ nào so với lúc VÀO không.
1. Nhận diện và lấy tọa độ (box) tất cả các dụng cụ trong Ảnh VÀO.
2. Nhận diện và lấy tọa độ (box) tất cả các dụng cụ trong Ảnh RA.
3. So sánh 2 danh sách: Liệt kê các dụng cụ có trong Ảnh VÀO nhưng KHÔNG xuất hiện trong Ảnh RA.

Trả về ĐÚNG MỘT đối tượng JSON có cấu trúc sau:
{
  "tools_in": [ { "name": "Tên dụng cụ", "box": [ymin, xmin, ymax, xmax] } ],
  "tools_out": [ { "name": "Tên dụng cụ", "box": [ymin, xmin, ymax, xmax] } ],
  "missing_tools": [ "Tên dụng cụ bị thiếu 1", "Tên dụng cụ bị thiếu 2" ],
  "status": "OK" (nếu số lượng bảo toàn) hoặc "MISSING" (nếu có dụng cụ bị thiếu)
}
Quy ước tọa độ "box": 4 số nguyên từ 0 đến 1000.`;

        const requestBody = {
            contents: [{
                parts: [
                    { text: "Đây là bức ảnh chụp dụng cụ lúc VÀO (Check-in):" },
                    { inlineData: { mimeType: mimeIn, data: base64In } },
                    { text: "Đây là bức ảnh chụp dụng cụ lúc RA (Check-out):" },
                    { inlineData: { mimeType: mimeOut, data: base64Out } },
                    { text: promptText }
                ]
            }],
            generationConfig: { 
                responseMimeType: "application/json",
                temperature: 0.1 // Giữ nhiệt độ thấp để tăng tính chính xác logic
            }
        };

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        
        return JSON.parse(data.candidates[0].content.parts[0].text);
    }

    async function analyzeImages() {
        if (!GEMINI_API_KEY || GEMINI_API_KEY.includes("DÁN_")) {
            alert("Vui lòng mở file code lên và cấu hình khóa API Key!");
            return;
        }

        const fileIn = document.getElementById('imageIn').files[0];
        const fileOut = document.getElementById('imageOut').files[0];

        if (!fileIn || !fileOut) { alert("Vui lòng tải lên cả hai hình ảnh!"); return; }

        document.getElementById('checkButton').disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('result-card').style.display = 'none';

        // Làm sạch canvas trước khi vẽ đè
        drawImageOnCanvas('canvasIn', imgInObj);
        drawImageOnCanvas('canvasOut', imgOutObj);

        try {
            const base64In = await getBase64(fileIn);
            const base64Out = await getBase64(fileOut);

            // Gửi API duy nhất 1 lần chứa cả 2 ảnh
            const aiResult = await compareToolsWithAI(base64In, fileIn.type, base64Out, fileOut.type);

            // Vẽ khung tọa độ lên Ảnh Vào
            if (aiResult.tools_in && aiResult.tools_in.length > 0) {
                aiResult.tools_in.forEach(item => {
                    if (item.box && item.box.length === 4) drawAlertBox('canvasIn', imgInObj, item.box);
                });
            }

            // Vẽ khung tọa độ lên Ảnh Ra
            if (aiResult.tools_out && aiResult.tools_out.length > 0) {
                aiResult.tools_out.forEach(item => {
                    if (item.box && item.box.length === 4) drawAlertBox('canvasOut', imgOutObj, item.box);
                });
            }

            // Hiển thị kết quả so sánh
            displayResults(aiResult);

        } catch (error) {
            alert("Đã xảy ra lỗi: " + error.message);
        } finally {
            document.getElementById('checkButton').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }
    }

    function displayResults(data) {
        const resultCard = document.getElementById('result-card');
        const resTitle = document.getElementById('res-title');
        const resDesc = document.getElementById('res-desc');

        resultCard.className = '';
        resultCard.style.display = 'block';

        if (data.status === 'MISSING' || (data.missing_tools && data.missing_tools.length > 0)) {
            resultCard.classList.add('status-missing');
            resTitle.innerHTML = '🔴 CẢNH BÁO: PHÁT HIỆN THIẾU DỤNG CỤ!';
            
            const missingList = data.missing_tools.length > 0 ? data.missing_tools.join(', ') : "Không xác định rõ tên";
            resDesc.innerHTML = `<b>Dụng cụ nghi ngờ thất lạc:</b> ${missingList}<br><br>` + 
                                `<b>Thống kê chi tiết:</b><br>` +
                                `- Số lượng lúc vào: ${data.tools_in.length}<br>` + 
                                `- Số lượng lúc ra: ${data.tools_out.length}`;
        } else {
            resultCard.classList.add('status-ok');
            resTitle.innerHTML = '🟢 HỢP LỆ: ĐẦY ĐỦ DỤNG CỤ';
            resDesc.innerHTML = `Tuyệt vời! Toàn bộ ${data.tools_in.length} dụng cụ mang vào đều được thu hồi đầy đủ khi ra.`;
        }
    }
</script>

</body>
</html>
